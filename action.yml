name: 'install-juliaup'
description: 'Install Juliaup, add it to the PATH, and use it to install Julia'
author: 'julia-actions organization, contributors'
inputs:
  channel:
    description: 'The Juliaup channel to install (and set as the default channel).'
    required: true
  token:
    description: 'GitHub token to use when contacting the GitHub API to fetch the list of Juliaup versions'
    required: false
    default: ${{ github.token }}
  juliaup-version:
    description: 'The Juliaup version to install. Defaults to "1", which expands to the latest available 1.x.y version of Juliaup.'
    required: false
    default: '1'
  add-to-path:
    description: 'Whether to add Juliaup and Julia to the PATH.'
    required: false
    default: 'true'
outputs:
  juliaup-path:
    description: 'The absolute path to the juliaup executable.'
  julialauncher-path:
    description: 'The absolute path to the julialauncher executable.'
runs:
  using: 'node24'
  main: 'dist/index.cjs'
branding:
  icon: 'download'
  color: 'green'
